# fly.toml app configuration file for the Farmish admin dashboard
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "farmish-admin-dashboard"
primary_region = "iad"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
