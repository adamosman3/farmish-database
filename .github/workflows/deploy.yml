name: Fly Deploy
on:
  push:
    branches:
    - main
  workflow_dispatch:

concurrency:
  group: production_deploy
  cancel-in-progress: true

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
jobs:
  deploy:
      name: Deploy app
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v6
        - uses: superfly/flyctl-actions/setup-flyctl@master
        - name: Sync Amplitude secrets to Fly
          if: ${{ vars.SKIP_SECRET_SYNC != 'true' }}
          run: |
            if [ -n "${{ secrets.AMPLITUDE_API_KEY }}" ] && [ -n "${{ secrets.AMPLITUDE_SECRET_KEY }}" ]; then
              flyctl secrets set --stage \
                AMPLITUDE_API_KEY="${{ secrets.AMPLITUDE_API_KEY }}" \
                AMPLITUDE_SECRET_KEY="${{ secrets.AMPLITUDE_SECRET_KEY }}"
            else
              echo "AMPLITUDE_API_KEY/AMPLITUDE_SECRET_KEY repo secrets not set; skipping sync."
            fi
        - run: flyctl deploy --remote-only
